<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>
    <meta name="description" content="This site is a product review practice page for wdd131 week05.">
    <meta name="author" content="Tyson Wilde">

    <link href="css/form.css" rel="stylesheet">
    <script src="js/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    
    <main>
   
        <form method="get" action="review.html" class="fo1">
        <fieldset>
            <legend>Product Name*</legend>
                <label for="product">Choose a Product</label>
                <select id="product" name="product" required>
                    <option value="" selected disabled>Select a Product...</option>
                </select>
        </fieldset>
        
        <fieldset>
           <legend>Overall Rating*</legend>
          
           <label><input type="radio" id="rating1" name="star" value="1" required> ★</label>
           <label for="rating1">1</label>
           <label><input type="radio" id="rating2" name="star" value="2" required> ★★</label>
           <label for="rating2">2</label>
           <label><input type="radio" id="rating3" name="star" value="3" required> ★★★</label>
           <label for="rating3">3</label>
           <label><input type="radio" id="rating4" ="star" value="4" required> ★★★★</label>
           <label for="rating4">4</label>
           <label><input type="radio" id="rating5" name="star" value="5" required> ★★★★★</label>
           <label for="rating5">5</label>
        </fieldset>
        
        <fieldset>
           <legend>Date of Installation*</legend> 
            <label for="date">yyyy-mm-dd</label>
            <input type="date" id="date" name="completed_date" required>
        </fieldset>
        
        <fieldset>

           <legend>Which features did you find useful in the product? </legend>
           <div>(Check all that apply)</div>
           
           <label><input type="checkbox" name="durability" value="yes"> Durability </label>
           <label><input type="checkbox" name="ease of use" value="yes"> Ease of Use</label>
           <label><input type="checkbox" name="performance" value="yes"> Performance</label>
           <label><input type="checkbox" name="design" value="yes"> Design</label>
        </fieldset>
        
        <fieldset>
           <legend>Written Review (optional)</legend> 
           <label for="review">Type in the box</label>
           <textarea id="review" name="review" rows="5" cols="40"></textarea>
        </fieldset>
        <fieldset>
           <legend>Your Name (optional)</legend>
           <label for="name">Type in the box</label>
           <input type="text" id="name" name="name">
        </fieldset>
        
         <input type="submit" value="Post Review">
        
        </form>

    </main>
    
    <footer>
        <p>&copy; 2026 Tyson Wilde. Canada</p>
        <p>Last modified: <span id="lastModified"></span></p>
    </footer>
    
</body>
</html>
